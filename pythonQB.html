<head>

    <style>
        :root {

        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--primary-color); }

        .paper-card { background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.3s; }
        .paper-card:hover { border-color: var(--secondary-color); transform: translateY(-3px); }
        .question-box { margin-bottom: 25px; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .options label { display: block; margin: 12px 0; padding: 12px; background: #f9f9f9; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #f0f0f0; }
        .options input { margin-right: 12px; transform: scale(1.2); }
        .btn { display: block; width: 100%; padding: 15px; background: var(--secondary-color); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .result-panel { display: none; text-align: center; padding: 25px; border: 3px solid var(--success-color); border-radius: 10px; margin-bottom: 30px; background: #f0fff4; }
        .analysis { margin-top: 15px; padding: 12px; background: #fff9f0; border-left: 5px solid var(--secondary-color); font-size: 0.95em; color: #555; }

        .wrong { border: 2px solid var(--error-color) !important; background: #fff5f5 !important; }
        .hidden { display: none; }
        .nav-bar { margin-bottom: 20px; cursor: pointer; color: var(--secondary-color); font-weight: bold; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: white; margin-bottom: 8px; }
        .tag-choice { background: #3498db; }
        .tag-tf { background: #9b59b6; }
    </style>
</head>

let currentPaperIdx = -1;

    function showMenu() {
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('nav').classList.add('hidden');
    }

    function startQuiz(idx) {
        currentPaperIdx = idx;
        const paper = papers[idx];
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        document.getElementById('nav').classList.remove('hidden');
        document.getElementById('paper-title').innerText = paper.title;
        document.getElementById('result-summary').style.display = 'none';
        
        const form = document.getElementById('quiz-form');
        form.innerHTML = '';
        
        paper.questions.forEach((item, qIdx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-box';
            qDiv.id = `q-box-${qIdx}`;
            
            // 题目标签
            const typeTag = item.options.length === 2 ? '<span class="tag tag-tf">判断题</span>' : '<span class="tag tag-choice">单选题</span>';
            
            let optionsHtml = '';
            item.options.forEach((opt, oIdx) => {
                const label = item.options.length === 2 ? (oIdx === 0 ? "A. 正确" : "B. 错误") : `${String.fromCharCode(65 + oIdx)}. ${opt}`;
                optionsHtml += `
                    <label>
                        <input type="radio" name="q${qIdx}" value="${oIdx}"> 
                        ${label}
                    </label>
                `;
            });

            qDiv.innerHTML = `
                ${typeTag}
                <p><strong>${qIdx + 1}. ${item.q}</strong></p>
                <div class="options">${optionsHtml}</div>
                <div id="analysis-${qIdx}" class="analysis hidden"></div>
            `;
            form.appendChild(qDiv);
        });
        document.getElementById('submit-btn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function submitAnswers() {
        const paper = papers[currentPaperIdx];
        let score = 0;
        paper.questions.forEach((item, qIdx) => {
            const selected = document.querySelector(`input[name="q${qIdx}"]:checked`);
            const qBox = document.getElementById(`q-box-${qIdx}`);
            const analysis = document.getElementById(`analysis-${qIdx}`);
            
            analysis.classList.remove('hidden');
            let resultText = `【正确答案：${String.fromCharCode(65 + item.ans)}】<br>${item.analysis}`;
            
            if (selected && parseInt(selected.value) === item.ans) {
                score += 5;
                qBox.className = 'question-box correct';
                analysis.innerHTML = `<span style="color:var(--success-color)">恭喜答对！</span><br>${resultText}`;
            } else {
                qBox.className = 'question-box wrong';
                const userAns = selected ? String.fromCharCode(65 + parseInt(selected.value)) : "未作答";
                analysis.innerHTML = `<span style="color:var(--error-color)">遗憾答错（你的选择：${userAns}）</span><br>${resultText}`;
            }
        });

        const resultPanel = document.getElementById('result-summary');
        resultPanel.style.display = 'block';
        resultPanel.innerHTML = `
            <h2>测试得分：${score} / 100</h2>
            <p>绿色背景为正确题目，红色背景为错误题目。你可以滑动页面查看下方详细解析。</p>
            <button class="btn" style="background:#34495e; width: 200px; margin: 20px auto;" onclick="showMenu()">返回主菜单</button>
        `;
        document.getElementById('submit-btn').classList.add('hidden');
        window.scrollTo(0,0);
    }
</script>
