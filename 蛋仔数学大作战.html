<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋仔数学大作战 - 圆柱圆锥篇</title>
    <style>
        /* [基础样式] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* 粒子背景 */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; width: 10px; height: 10px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; animation: floatUp 8s infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }

        /* [初始界面样式 - 已修正对称性] */
        .start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .start-screen.hide { transform: translateY(-100%); }
        
        .welcome-content { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            color: white; 
            animation: fadeInDown 1s ease-out; 
        }
        .welcome-content h1 {
            font-size: 5rem; margin-bottom: 20px; text-shadow: 4px 4px 0 #ff6b6b, 8px 8px 0 rgba(0,0,0,0.1);
            letter-spacing: 5px; animation: pulse 2s infinite;
        }
        .welcome-content p { font-size: 1.8rem; margin-bottom: 40px; opacity: 0.9; }

        /* 修正后的角色容器：确保水平绝对居中 */
        .egg-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 60px; /* 增加间距使布局更舒展 */
            width: 100%; 
            max-width: 800px;
            margin: 0 auto 50px auto; 
        }
        
        /* 修正后的角色卡片：固定宽度实现完美对称 */
        .egg-card {
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; 
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            transition: 0.3s; 
            width: 240px; /* 固定宽度 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .egg-card:hover { transform: translateY(-15px) rotate(3deg); }
        .egg-avatar {
            width: 140px; height: 140px; border-radius: 50%; margin-bottom: 20px;
            border: 6px solid; overflow: hidden; background: white;
        }
        .egg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .egg-card.red { border-bottom: 8px solid #ff6b6b; }
        .egg-card.red .egg-avatar { border-color: #ff6b6b; }
        .egg-card.blue { border-bottom: 8px solid #4ecdc4; }
        .egg-card.blue .egg-avatar { border-color: #4ecdc4; }
        .egg-name { font-size: 1.8rem; font-weight: bold; color: #333; }
        
        .start-button {
            padding: 25px 80px; font-size: 2.5rem; font-weight: 900; color: white;
            background: #ffd93d; border: none; border-radius: 60px; cursor: pointer;
            box-shadow: 0 10px 0 #d4a017; transition: 0.1s; text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        .start-button:hover { background: #ffea72; transform: scale(1.05); }
        .start-button:active { transform: translateY(6px); box-shadow: 0 4px 0 #d4a017; }

        /* [游戏内样式 - 保持02版不变] */
        .game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 1; position: relative; }
        .header h1 { font-size: 2.5rem; color: #fff; text-shadow: 3px 3px 0 #ff6b6b; margin-bottom: 15px; }
        .info-box { background: rgba(255, 255, 255, 0.9); padding: 10px 40px; border-radius: 50px; border: 4px solid #ffd93d; margin-bottom: 15px; }
        #timer { font-size: 2.2rem; font-weight: bold; color: #333; }
        
        .battle-arena { display: flex; gap: 20px; width: 100%; max-width: 1200px; height: 55vh; }
        .player-zone { flex: 1; background: rgba(255, 255, 255, 0.95); border-radius: 30px; padding: 20px; display: flex; flex-direction: column; border: 6px solid; position: relative; }
        .red-player { border-color: #ff6b6b; }
        .blue-player { border-color: #4ecdc4; }
        
        .player-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border-bottom: 2px dashed #eee; padding-bottom: 10px; }
        .avatar-game { width: 60px; height: 60px; border-radius: 50%; overflow: hidden; border: 3px solid #fff; }
        .avatar-game img { width: 100%; height: 100%; object-fit: cover; }
        .player-score { font-size: 2.2rem; font-weight: 800; }
        .detail-stats { font-size: 0.8rem; color: #666; }

        .question-area { background: #f8f9fa; border-radius: 20px; padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 15px; }
        .question-text { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 8px; }
        .question-formula { font-size: 0.95rem; color: #777; background: #eee; padding: 4px 10px; border-radius: 8px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .answer-btn { padding: 15px; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white; transition: 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .answer-btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-yes { background: #4ecdc4; }
        .btn-no { background: #ff6b6b; }

        /* 结算及查看题库样式 */
        .overlay-end { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        .overlay-end.show { display: flex; }
        #reviewArea { width: 100%; max-width: 600px; height: 300px; overflow-y: auto; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin: 20px 0; display: none; }
        .review-row { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0; }
        .ans-tag { color: #ffd93d; font-weight: bold; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .feedback-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; opacity: 0; pointer-events: none; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, 0%) scale(0.5); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(1.5); } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div id="startScreen" class="start-screen">
        <div class="welcome-content">
            <h1>蛋仔数学大作战</h1>
            <p>—— 圆柱与圆锥篇 ——</p>
            <div class="egg-container">
                <div class="egg-card red">
                    <div class="egg-avatar"><img src="https://www.coze.cn/s/D0g2ttni9zo/?width_height=1439x1436"></div>
                    <div class="egg-name">小红</div>
                </div>
                <div class="egg-card blue">
                    <div class="egg-avatar"><img src="https://www.coze.cn/s/J2JyLNdLl7w/?width_height=959x973"></div>
                    <div class="egg-name">小蓝</div>
                </div>
            </div>
            <button class="start-button" onclick="startGame()">开始挑战</button>
        </div>
    </div>

    <div class="game-container">
        <div class="header"><h1>圆柱圆锥竞赛</h1></div>
        <div class="info-box"><div id="timer">03:00</div></div>

        <div class="battle-arena">
            <div class="player-zone red-player">
                <div class="player-header">
                    <div class="avatar-game"><img src="https://www.coze.cn/s/D0g2ttni9zo/?width_height=1439x1436"></div>
                    <div class="score-info">
                        <div class="player-score" id="redScore">0</div>
                        <div class="detail-stats" id="redStats">对: 0 / 错: 0</div>
                    </div>
                </div>
                <div class="question-area">
                    <div id="redQuestion" class="question-text">等待中...</div>
                    <div id="redFormula" class="question-formula"></div>
                </div>
                <div class="btn-group">
                    <button class="answer-btn btn-yes" onclick="handleAns('red', true)">✓ 正确</button>
                    <button class="answer-btn btn-no" onclick="handleAns('red', false)">✗ 错误</button>
                </div>
                <div id="redFeedback" class="feedback-pop"></div>
            </div>

            <div class="player-zone blue-player">
                <div class="player-header">
                    <div class="avatar-game"><img src="https://www.coze.cn/s/J2JyLNdLl7w/?width_height=959x973"></div>
                    <div class="score-info">
                        <div class="player-score" id="blueScore">0</div>
                        <div class="detail-stats" id="blueStats">对: 0 / 错: 0</div>
                    </div>
                </div>
                <div class="question-area">
                    <div id="blueQuestion" class="question-text">等待中...</div>
                    <div id="blueFormula" class="question-formula"></div>
                </div>
                <div class="btn-group">
                    <button class="answer-btn btn-yes" onclick="handleAns('blue', true)">✓ 正确</button>
                    <button class="answer-btn btn-no" onclick="handleAns('blue', false)">✗ 错误</button>
                </div>
                <div id="blueFeedback" class="feedback-pop"></div>
            </div>
        </div>
    </div>

    <div id="endScreen" class="overlay-end">
        <h1 id="winnerTitle" style="font-size: 3rem; margin-bottom: 20px;">🏆</h1>
        <div id="resultContent" style="display: flex; gap: 50px; text-align: center; margin-bottom: 20px;">
            <div><h3>小红</h3><p id="resRed" style="font-size: 2.2rem;"></p></div>
            <div><h3>小蓝</h3><p id="resBlue" style="font-size: 2.2rem;"></p></div>
        </div>
        <div id="reviewArea"></div>
        <div style="display: flex; gap: 20px;">
            <button id="toggleBtn" class="start-button" style="font-size: 1.5rem; padding: 15px 40px;" onclick="toggleReview()">🔍 查看题库</button>
            <button class="start-button" style="font-size: 1.5rem; padding: 15px 40px; background: #ff6b6b; box-shadow: 0 10px 0 #d95a5a;" onclick="location.reload()">🔄 重来</button>
        </div>
    </div>

    <script>
        const audio = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(type) {
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                if(type === 'ok') { o.type='sine'; o.frequency.value=880; g.gain.value=0.1; o.start(); o.stop(this.ctx.currentTime+0.2); }
                else if(type === 'err') { o.type='square'; o.frequency.value=220; g.gain.value=0.1; o.start(); o.stop(this.ctx.currentTime+0.3); }
                else if(type === 'win') { o.type='sine'; o.frequency.value=554; g.gain.value=0.1; o.start(); o.stop(this.ctx.currentTime+0.5); }
            }
        };

        const masterQs = [
            { q: "圆柱侧面展开一定是一个长方形？", a: true, f: "沿高展开即为长方形" },
            { q: "圆锥的体积等于圆柱体积的1/3？", a: false, f: "必须是等底等高的情况下" },
            { q: "圆柱底面半径扩大2倍，体积也扩大2倍？", a: false, f: "半径平方关系，体积应扩大4倍" },
            { q: "等底等高的圆柱体积是圆锥体积的3倍？", a: true, f: "V柱=Sh, V锥=1/3Sh" },
            { q: "圆柱的高有无数条，圆锥的高只有一条？", a: true, f: "基础特征" },
            { q: "圆锥底面积是12，高是3，体积是36？", a: false, f: "应该是 1/3 * 12 * 3 = 12" },
            { q: "圆柱两个底面之间的距离叫做圆柱的高？", a: true, f: "高的定义" },
            { q: "圆锥只有1个顶点和1个底面？", a: true, f: "几何体基本特征" },
            { q: "圆柱侧面积 = 底面周长 × 高？", a: true, f: "S侧 = Ch" },
            { q: "直角三角形绕一直角边旋转一周得到圆锥？", a: true, f: "旋转成型原理" }
        ];

        let state = {
            active: false, timeLeft: 180,
            redIdx: 0, redScore: 0, redOk: 0, redErr: 0, redList: [],
            blueIdx: 0, blueScore: 0, blueOk: 0, blueErr: 0, blueList: [],
            totalQs: 10 
        };

        function startGame() {
            state.active = true;
            state.redList = [...masterQs].sort(() => Math.random() - 0.5).slice(0, 10);
            state.blueList = [...masterQs].sort(() => Math.random() - 0.5).slice(0, 10);
            document.getElementById('startScreen').classList.add('hide');
            updateUI('red'); updateUI('blue');
            
            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                const m = Math.floor(state.timeLeft/60).toString().padStart(2,'0');
                const s = (state.timeLeft%60).toString().padStart(2,'0');
                document.getElementById('timer').textContent = `${m}:${s}`;
                if(state.timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateUI(p) {
            const idx = state[p+'Idx'], list = state[p+'List'], pre = p === 'red' ? 'red' : 'blue';
            if(idx < state.totalQs) {
                document.getElementById(pre+'Question').textContent = list[idx].q;
                document.getElementById(pre+'Formula').textContent = list[idx].f;
            } else {
                document.getElementById(pre+'Question').textContent = "🏁 已答完！";
                document.getElementById(pre+'Formula').textContent = "等待对方...";
            }
            document.getElementById(pre+'Score').textContent = state[p+'Score'];
            document.getElementById(pre+'Stats').textContent = `对: ${state[p+'Ok']} / 错: ${state[p+'Err']}`;
        }

        function handleAns(p, choice) {
            if(!state.active || state[p+'Idx'] >= state.totalQs) return;
            if(state[p+'List'][state[p+'Idx']].a === choice) {
                state[p+'Score'] += 10; state[p+'Ok']++; audio.play('ok'); popFeedback(p, '✨');
            } else {
                state[p+'Err']++; audio.play('err'); popFeedback(p, '❌');
            }
            state[p+'Idx']++;
            updateUI(p);
            if(state.redIdx >= state.totalQs && state.blueIdx >= state.totalQs) setTimeout(endGame, 600);
        }

        function popFeedback(p, char) {
            const el = document.getElementById(p+'Feedback');
            el.textContent = char; el.style.animation = 'none';
            void el.offsetWidth; el.style.animation = 'popUp 0.8s forwards';
        }

        function toggleReview() {
            const area = document.getElementById('reviewArea'), res = document.getElementById('resultContent'), btn = document.getElementById('toggleBtn');
            if(area.style.display === 'block') {
                area.style.display = 'none'; res.style.display = 'flex'; btn.textContent = '🔍 查看题库';
            } else {
                area.innerHTML = '<h3>解析：</h3>' + masterQs.map(x => `<div class="review-row">问：${x.q}<br>解：<span class="ans-tag">${x.a?'对 ✓':'错 ✗'}</span> (${x.f})</div>`).join('');
                area.style.display = 'block'; res.style.display = 'none'; btn.textContent = '⬅ 返回';
            }
        }

        function endGame() {
            if(!state.active) return;
            state.active = false; clearInterval(state.timerInterval);
            audio.play('win');
            document.getElementById('resRed').innerHTML = `${state.redScore}分<br><small>对${state.redOk}/错${state.redErr}</small>`;
            document.getElementById('resBlue').innerHTML = `${state.blueScore}分<br><small>对${state.blueOk}/错${state.blueErr}</small>`;
            let win = "🤝 平局！";
            if(state.redScore > state.blueScore) win = "🏆 小红获胜！";
            else if(state.blueScore > state.redScore) win = "🏆 小蓝获胜！";
            document.getElementById('winnerTitle').textContent = win;
            document.getElementById('endScreen').classList.add('show');
        }

        // 初始化粒子
        const pCon = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = Math.random() * 100 + '%'; p.style.animationDelay = Math.random() * 8 + 's';
            pCon.appendChild(p);
        }
    </script>
</body>
</html>
